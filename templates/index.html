<!DOCTYPE html>
<html>
<head>
<title>Iris Flower Prediction</title>
<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
margin-top:100px;
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<h2>Iris Flower Prediction</h2>

<form action="/predict" method="post">

<input type="text" name="sepal_length" placeholder="Sepal Length" required>
<input type="text" name="sepal_width" placeholder="Sepal Width" required>
<input type="text" name="petal_length" placeholder="Petal Length" required>
<input type="text" name="petal_width" placeholder="Petal Width" required>

<button type="submit">Predict</button>

</form>

<br>

<h3>{{ prediction }}</h3>

</div>

</body>
</html>
